<script>
// Validações COMPLETAS portadas Main.java
const VALIDACOES = {
  1: code => code.includes('println') && code.includes('oi'),
  2: code => code.includes('nextint') && code.includes('nextint'),
  3: code => code.includes('for') && code.includes('<=10'),
  4: code => code.includes('if') && code.includes('>=18'),
  5: code => code.includes('%') && code.includes('2'),
  6: code => code.includes('int[') && code.includes('for'),
  7: code => code.includes('static int') && code.includes('return'),
  8: code => code.includes('while') && code.includes('<5'),
  9: code => code.includes('do') && code.includes('while'),
  10: code => code.includes('switch') && code.includes('case')
};

const DICAS = {
  1: 'System.out.println("Oi Mundo Java!");',
  2: 'int n1=sc.nextInt();\nint n2=sc.nextInt();\nSystem.out.println(n1+n2);',
  3: 'for(int i=1;i<=10;i++) System.out.println(i);',
  4: 'int idade=sc.nextInt();\nif(idade>=18) System.out.println("adulto"); else System.out.println("criança");',
  5: 'int n=sc.nextInt();\nif(n%2==0) System.out.println("PAR"); else System.out.println("IMPAR");',
  6: 'int[] arr={1,2,3};\nint soma=0;\nfor(int x:arr) soma+=x;\nSystem.out.println(soma);',
  7: 'static int soma(int a,int b){return a+b;}\nSystem.out.println(soma(2,3));',
  8: 'int i=0;\nwhile(i<5){System.out.println("i="+i); i++;}',
  9: 'int opc=1;\ndo{opc=sc.nextInt();}while(opc!=0);',
  10: 'int dia=sc.nextInt();\nswitch(dia){case 1: System.out.println("Segunda");break;default:System.out.println("Inválido");}'
};

function test(n) {
  const code = document.getElementById('code'+n).value.toLowerCase();
  const res = document.getElementById('res'+n);
  res.innerHTML = '🔍 ANALISANDO ESTRUTURA...';
  res.className = 'result';
  setTimeout(() => {
    const ok = VALIDACOES[n](code);
    if (ok) {
      res.innerHTML = '🎉 CÓDIGO VALIDADO! ✅ 100% correta estrutura!';
      res.className = 'result success';
    } else {
      res.innerHTML = '❌ Estrutura incompleta. 💡 Clique DICA PASSO!';
      res.className = 'result error';
    }
  }, 1000);
}

function dica(n) {
  const ta = document.getElementById('code'+n);
  ta.value += '\n// ' + DICAS[n];
  document.getElementById('res'+n).innerHTML = '✅ DICAS inseridas! Agora TESTAR 👆';
}

function scrollToEx(n) {
  document.getElementById('ex'+n).scrollIntoView({behavior:'smooth'});
}
</script>
